
services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8080:8080"  # Puerto administrativo
    command: start --admin-port=8080

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=1
    depends_on:
      - db
      - redis
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped
    user: www-data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

volumes:
  db_data:
  storage_data: