version: "3.9"

services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped


  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=1
    depends_on:
      - db
      - redis
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped
    user: www-data


  redis:
    image: redis:7-alpine
    restart: unless-stopped


  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-app}
      MYSQL_USER: ${DB_USERNAME:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10


volumes:
  db_data:
  storage_data:version: "3.9"

services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000 --admin-port=2019
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped


  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped
    user: www-data


  redis:
    image: redis:7-alpine
    restart: unless-stopped


  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-app}
      MYSQL_USER: ${DB_USERNAME:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10


volumes:
  db_data:
  storage_data: